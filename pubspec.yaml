name: shard_wallet
description: ShardCoin (SHRD) wallet - cross-platform, non-custodial
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  bip39: ^1.0.6
  bip32: ^2.0.0
  hex: ^0.2.0
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  qr_flutter: ^4.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  local_auth: ^2.1.8
  path_provider: ^2.1.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
